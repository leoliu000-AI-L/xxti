</div>

  <script>
  const scanner = document.getElementById('fingerprintScanner');
  const scannerTextMain = document.querySelector('.scanner-text-main');
  const scannerTextSub = document.querySelector('.scanner-text-sub');
  const ringFill = document.querySelector('.scanner-ring-fill');
  let isScanning = false;
  let animationFrame;
  let startTime;
  const scannerCopy = {
    idle: { main: '\u957f\u6309\u6ce8\u5165\u7075\u529b', sub: 'Hold to start' },
    charging: { main: '\u7075\u529b\u6c47\u805a\u4e2d...', sub: 'Charging...' },
    success: { main: '\u547d\u76d8\u5f00\u542f', sub: 'Portal aligned' },
  };
  function setScannerCopy(copy) {
    if (scannerTextMain) scannerTextMain.textContent = copy.main;
    if (scannerTextSub) scannerTextSub.textContent = copy.sub;
  }
  function animateProgress(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = timestamp - startTime;
    const progress = Math.min((elapsed / 2000) * 100, 100);
    ringFill.style.background = `conic-gradient(var(--cyan-main) ${progress}%, transparent 0)`;
    if (progress < 100 && isScanning) {
      animationFrame = requestAnimationFrame(animateProgress);
    } else if (progress >= 100) {
      isScanning = false;
      scanner.setAttribute('aria-pressed', 'false');
      setScannerCopy(scannerCopy.success);
      scanner.classList.add('success');
      ringFill.style.background = `conic-gradient(var(--gold-main) 100%, transparent 0)`;
      setTimeout(() => {
        document.getElementById('startBtn')?.click();
        setTimeout(stopScan, 500);
      }, 800);
    }
  }
  function startScan(event) {
    if (event.type === 'touchstart') event.preventDefault();
    if (event.type === 'keydown') {
      if (!['Enter', ' '].includes(event.key)) return;
      event.preventDefault();
    }
    if (isScanning || scanner.classList.contains('success')) return;
    isScanning = true;
    startTime = null;
    scanner.classList.add('scanning');
    scanner.setAttribute('aria-pressed', 'true');
    setScannerCopy(scannerCopy.charging);
    cancelAnimationFrame(animationFrame);
    animationFrame = requestAnimationFrame(animateProgress);
  }
  function stopScan(event) {
    if (event && event.type === 'keyup' && !['Enter', ' '].includes(event.key)) return;
    isScanning = false;
    scanner.setAttribute('aria-pressed', 'false');
    cancelAnimationFrame(animationFrame);
    ringFill.style.background = `conic-gradient(var(--cyan-main) 0%, transparent 0)`;
    scanner.classList.remove('scanning');
    scanner.classList.remove('success');
    setScannerCopy(scannerCopy.idle);
  }
  setScannerCopy(scannerCopy.idle);
  scanner.addEventListener('mousedown', startScan);
  scanner.addEventListener('mouseup', stopScan);
  scanner.addEventListener('mouseleave', stopScan);
  scanner.addEventListener('touchstart', startScan);
  scanner.addEventListener('touchend', stopScan);
  scanner.addEventListener('touchcancel', stopScan);
  scanner.addEventListener('keydown', startScan);
  scanner.addEventListener('keyup', stopScan);
  scanner.addEventListener('blur', stopScan);
</script>
